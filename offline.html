<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Street Grammar Driving School</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #faf9f6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      color: #1e1e1e;
    }
    .offline-card {
      background: white;
      border-radius: 40px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 30px 50px rgba(0,0,0,0.1);
      max-width: 480px;
      border: 1px solid #eaeaea;
    }
    .icon {
      width: 100px;
      height: 100px;
      background: #1e1e1e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      color: #b7934e;
      font-size: 3rem;
    }
    h2 {
      font-size: 2rem;
      margin-bottom: 16px;
    }
    p {
      color: #5c5c5c;
      margin-bottom: 24px;
      font-size: 1.1rem;
    }
    .btn {
      background: #1e1e1e;
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      border: 1px solid #1e1e1e;
      transition: 0.2s;
    }
    .btn:hover {
      background: white;
      color: #1e1e1e;
      border-color: #b7934e;
    }
    .small {
      margin-top: 24px;
      color: #9a9a9a;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="icon">
      <i class="fas fa-wifi-slash"></i>
    </div>
    <h2>you're offline</h2>
    <p>Street Grammar Driving School is ready when you are.<br>Connect to the internet to book lessons or see the latest.</p>
    <a href="/" class="btn"><i class="fas fa-redo-alt"></i> try again</a>
    <div class="small">
      <i class="fas fa-car"></i> Unit 10/11 Fairmount St, Lakemba
    </div>
  </div>
  <!-- Font Awesome for icons -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
</body>
</html>
